services:
  web:
    env_file:
      - apps/web/.env
    environment:
      DATABASE_URL: "file:./prisma/data/vectorops.db"
      # Production seed — runs once on first deploy when SEED_ADMIN_EMAIL is set.
      # Remove or leave unset after the initial deployment.
      # SEED_ADMIN_NAME: "Your Name"
      # SEED_ADMIN_EMAIL: "admin@yourcompany.com"
      # SEED_ADMIN_PASSWORD: "ChangeMe123!"
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3005:3000"
    volumes:
      # Named volume so Docker manages directory ownership (avoids permission errors
      # that occur when a bind-mount directory is created as root on the host while
      # the container runs as the non-root "node" user).
      - vectorops-data:/app/apps/web/prisma/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:3000/api/health'').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  vectorops-data:
