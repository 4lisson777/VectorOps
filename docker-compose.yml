services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3005:3000"
    env_file:
      - ./apps/web/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: "file:/app/apps/web/prisma/data/shinobiops.db"
    volumes:
      # Persist SQLite database across container restarts
      - ./data:/app/apps/web/prisma/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:3000/api/health'').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
